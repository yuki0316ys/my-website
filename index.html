  <div class="news-modal" id="topicModal" aria-hidden="true">
    <button type="button" class="news-modal__backdrop" data-topic-close aria-label="閉じる"></button>
    <section class="news-modal__panel" role="dialog" aria-modal="true" aria-labelledby="topicModalTitle" tabindex="-1">
      <button type="button" class="news-modal__close" data-topic-close aria-label="閉じる">×</button>
      <p class="news-modal__date" id="topicModalCategory"></p>
      <h2 class="news-modal__title" id="topicModalTitle"></h2>
      <div class="news-modal__body" id="topicModalBody"></div>
      <p class="news-modal__link-wrap" id="topicModalLinkWrap"></p>
    </section>
  </div>

  <script>
    if (window.matchMedia("(min-width: 769px) and (hover: hover) and (pointer: fine)").matches) {
      (function () {
        const video = document.querySelector(".featured-video");
        if (!video) return;
        video.setAttribute("autoplay", "");
        video.play().catch(() => {});
      })();

      document.addEventListener("mousemove", e => {
        document.body.style.setProperty("--x", e.clientX + "px");
        document.body.style.setProperty("--y", e.clientY + "px");
      });

      window.addEventListener("scroll", () => {
        const heroBg = document.querySelector(".hero-bg");
        if (!heroBg) return;

        const scrolled = window.scrollY;
        heroBg.style.transform = "scale(1.08) translateY(" + (scrolled * 0.15) + "px)";
      }, { passive: true });
    } else {
      (function () {
        const video = document.querySelector(".featured-video");
        if (!video) return;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute("autoplay", "");
        video.setAttribute("preload", "metadata");
        video.play().catch(() => {});
      })();
    }

    const els = document.querySelectorAll(".reveal");
    if ("IntersectionObserver" in window) {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("active");
          }
        });
      }, { threshold: 0.1 });

      els.forEach(el => {
        observer.observe(el);
        if (el.getBoundingClientRect().top < window.innerHeight) {
          el.classList.add("active");
        }
      });
    } else {
      els.forEach(el => el.classList.add("active"));
    }

    const menuToggle = document.getElementById("menuToggle");
    const nav = document.getElementById("nav");

    if (menuToggle && nav) {
      menuToggle.addEventListener("click", () => {
        nav.classList.toggle("active");
        menuToggle.classList.toggle("active");
      });
    }

    const topicDetails = {
      shigafutari: {
        category: "RELEASE",
        title: "死ガフタリヲワカツマデ リリース決定！",
        body: "14th Single「死ガフタリヲワカツマデ」のリリースが決定しました。楽曲情報は順次公式サイトにてお知らせします。",
        linkUrl: "songs/songs.html",
        linkLabel: "Songsページへ"
      },
      live: {
        category: "LIVE",
        title: "佑樹 Rehabilitation 2026 死ガフタリヲワカツマデ Release Event 2026.11.1 開催決定！",
        body: "佑樹のライブ「Rehabilitation 2026 死ガフタリヲワカツマデ Release Event」が、2026年11月1日に開催決定しました。公演情報や詳細はLiveページでご確認ください。",
        linkUrl: "live.html",
        linkLabel: "Liveページへ"
      },
      "line-sticker": {
        category: "NFT",
        title: "LINEスタンプ販売中!",
        body: "ゆっくんLINEスタンプを販売中です。日常のトークで使いやすいスタンプをぜひチェックしてください。",
        linkUrl: "https://line.me/S/sticker/33985072",
        linkLabel: "LINEスタンプを見る"
      },
      apparel: {
        category: "OFFICIAL GOODS",
        title: "The Apparel 一般販売開始!",
        body: "YUKI / 佑樹が手掛けるThe Apparelの一般販売を開始しました。商品ラインナップはStoreページでご確認ください。",
        linkUrl: "store.html",
        linkLabel: "Storeページへ"
      }
    };

    const topicModal = document.getElementById("topicModal");
    const topicModalPanel = topicModal ? topicModal.querySelector(".news-modal__panel") : null;
    const topicModalCategory = document.getElementById("topicModalCategory");
    const topicModalTitle = document.getElementById("topicModalTitle");
    const topicModalBody = document.getElementById("topicModalBody");
    const topicModalLinkWrap = document.getElementById("topicModalLinkWrap");
    let lastTopicTrigger = null;

    function fitModalTitle(titleElement) {
      if (!titleElement) return;

      titleElement.style.fontSize = "";
      const minSize = window.matchMedia("(max-width: 768px), ((max-height: 768px) and (orientation: landscape) and (hover: none) and (pointer: coarse))").matches ? 6 : 9;
      let size = parseFloat(window.getComputedStyle(titleElement).fontSize);

      while (titleElement.scrollWidth > titleElement.clientWidth && size > minSize) {
        size -= .5;
        titleElement.style.fontSize = `${size}px`;
      }
    }

    function openTopicModal(topicId, trigger) {
      const detail = topicDetails[topicId];
      if (!detail || !topicModal) return;

      lastTopicTrigger = trigger;
      topicModalCategory.textContent = detail.category;
      topicModalTitle.textContent = detail.title;
      topicModalBody.textContent = detail.body;
      topicModalLinkWrap.textContent = "";

      if (detail.linkUrl) {
        const link = document.createElement("a");
        link.href = detail.linkUrl;
        if (detail.linkUrl.startsWith("http")) {
          link.target = "_blank";
          link.rel = "noopener noreferrer";
        }
        link.textContent = detail.linkLabel;
        topicModalLinkWrap.appendChild(link);
      }

      topicModal.classList.add("active");
      topicModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("news-modal-open");
      requestAnimationFrame(() => fitModalTitle(topicModalTitle));
      if (topicModalPanel) topicModalPanel.focus();
    }

    function closeTopicModal() {
      if (!topicModal) return;

      topicModal.classList.remove("active");
      topicModal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("news-modal-open");
      if (lastTopicTrigger) lastTopicTrigger.focus();
    }

    document.querySelectorAll(".topic-open").forEach(button => {
      button.addEventListener("click", () => openTopicModal(button.dataset.topicId, button));
    });

    document.querySelectorAll("[data-topic-close]").forEach(button => {
      button.addEventListener("click", closeTopicModal);
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && topicModal && topicModal.classList.contains("active")) {
        closeTopicModal();
      }
    });

    window.addEventListener("resize", () => {
      if (topicModal && topicModal.classList.contains("active")) {
        fitModalTitle(topicModalTitle);
      }
    });
  </script>
</body>
