<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Video Test | YUKI / 佑樹</title>
  <style>
    * { box-sizing: border-box; }
    html { background:#000; -webkit-text-size-adjust:100%; }
    body { margin:0; background:#050505; color:#f7f1e8; font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; overflow-x:hidden; }
    header { position:sticky; top:0; padding:18px; background:rgba(0,0,0,.92); border-bottom:1px solid rgba(255,255,255,.1); font-weight:700; }
    main { padding:24px 18px 48px; }
    .card { max-width:760px; margin:0 auto; padding:16px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); border-radius:16px; }
    .video-frame { position:relative; width:100%; aspect-ratio:16/9; background:#000; }
    video { width:100%; height:100%; object-fit:cover; }
    p { color:rgba(247,241,232,.72); line-height:1.7; }
  </style>
</head>
<body>
  <header>YUKI / 佑樹 Video Test</header>
  <main>
    <h1>Video Tag Test</h1>
    <p>本番と近い video タグだけを置いたテストです。CSS演出・画像リスト・本番JSはありません。</p>
    <div class="card">
      <div class="video-frame">
        <video autoplay muted loop playsinline webkit-playsinline preload="none" poster="images/sakayume.jpg" data-video-src="video/hero.mp4" aria-label="逆夢 featured video"></video>
      </div>
    </div>
  </main>
</body>
</html>
