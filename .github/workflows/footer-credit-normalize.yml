name: Normalize Footer Credit

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize footer credit
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          CREDIT = 'YUKI / 佑樹（YUKI OFFCIAL STUDIO PRO 01）'
          FOOTER = f'<footer class="footer"><p>&copy; 2026 {CREDIT}. All rights reserved.</p></footer>'

          patterns = [
              re.compile(r'<footer class="footer"><p>&copy;\s*2026\s*.*?All rights reserved\.</p></footer>', re.S),
              re.compile(r'<footer class="footer">\s*<p>&copy;\s*2026\s*.*?All rights reserved\.</p>\s*</footer>', re.S),
          ]

          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              original = text
              for pattern in patterns:
                  text = pattern.sub(FOOTER, text)
              if text != original:
                  path.write_text(text, encoding='utf-8')

          Path('.github/workflows/footer-credit-normalize.yml').unlink(missing_ok=True)
          PY
      - name: Commit footer credit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No footer changes to commit"
          else
            git commit -m "Normalize footer credit across pages"
            git push
          fi
