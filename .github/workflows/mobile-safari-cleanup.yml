name: Mobile Safari Cleanup

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove PWA remnants and add iOS cleanup
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          cleanup_script = '''
<script>
(function () {
  var isiOS = /iP(hone|od|ad)/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  if (!isiOS || !("serviceWorker" in navigator)) return;

  window.addEventListener("load", function () {
    navigator.serviceWorker.getRegistrations()
      .then(function (registrations) {
        registrations.forEach(function (registration) {
          registration.unregister();
        });
      })
      .catch(function () {});

    if (window.caches && caches.keys) {
      caches.keys()
        .then(function (keys) {
          keys.forEach(function (key) {
            caches.delete(key);
          });
        })
        .catch(function () {});
    }
  });
})();
</script>
'''.strip()

          marker = 'navigator.serviceWorker.getRegistrations()'

          for path in Path('.').rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              original = text

              text = re.sub(r'\s*<link\s+rel=["\']manifest["\'][^>]*>\s*', '\n', text, flags=re.I)
              text = re.sub(r'\s*<meta\s+name=["\']apple-mobile-web-app-capable["\'][^>]*>\s*', '\n', text, flags=re.I)
              text = re.sub(r'\s*<meta\s+name=["\']apple-mobile-web-app-status-bar-style["\'][^>]*>\s*', '\n', text, flags=re.I)

              if marker not in text and '</body>' in text:
                  text = text.replace('</body>', cleanup_script + '\n</body>', 1)
              elif marker not in text and '</BODY>' in text:
                  text = text.replace('</BODY>', cleanup_script + '\n</BODY>', 1)

              if text != original:
                  path.write_text(text, encoding='utf-8')

          css_path = Path('style.css')
          css = css_path.read_text(encoding='utf-8')
          css_marker = '/* iOS navigation crash guard */'
          css_block = '''

/* iOS navigation crash guard */
@supports (-webkit-touch-callout: none) {
  @media (max-width: 768px) {
    html body {
      overflow-x: hidden !important;
      -webkit-text-size-adjust: 100% !important;
    }

    html body *,
    html body *::before,
    html body *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
    }

    html body .results-track {
      animation: none !important;
      transform: none !important;
    }

    html body video,
    html body audio,
    html body iframe,
    html body img {
      max-width: 100% !important;
    }
  }
}
'''
          if css_marker not in css:
              css_path.write_text(css.rstrip() + css_block, encoding='utf-8')
          PY
          rm -f .github/workflows/mobile-safari-cleanup.yml

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Stabilize mobile Safari navigation"
          git push
