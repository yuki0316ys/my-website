name: Fix Mobile Preview Title

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-css:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add mobile preview title override
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('style.css')
          css = path.read_text()
          marker = '/* Mobile preview title fit */'
          block = '''

/* Mobile preview title fit */
@media (max-width: 768px) {
  html body .preview-player,
  html body .preview-player__inner {
    overflow: hidden !important;
  }

  html body .preview-player h2,
  html body .preview-player__inner h2 {
    max-width: 100% !important;
    margin-inline: auto !important;
    font-size: clamp(1.5rem, 7.2vw, 2.35rem) !important;
    letter-spacing: 0.015em !important;
    line-height: 1.12 !important;
    text-align: center !important;
    overflow-wrap: anywhere !important;
    word-break: break-word !important;
    white-space: normal !important;
  }
}
'''
          if marker not in css:
              css = css.rstrip() + block
              path.write_text(css)
          PY
          rm -f .github/workflows/fix-mobile-preview-title.yml

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Fix mobile preview title wrapping"
          git push
