name: Reorder Song Cards

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  reorder:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reorder song cards by release date
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          release_order = [
              "Freedom.html",
              "KeepOnlyOneLady.html",
              "akatsuki.html",
              "Sakayume.html",
              "JENESIS.html",
              "BE-TRIP.html",
              "harutoakikaze.html",
              "amaterasu.html",
              "Nextinnovation.html",
              "Breakingallthechains.html",
              "The Beast.html",
              "rinne.html",
              "uno.html",
          ]

          def norm_href(href):
              href = href.split('#', 1)[0].split('?', 1)[0]
              return href.rsplit('/', 1)[-1]

          def update_index(card, index):
              return re.sub(
                  r'(<span class="track-card__index">)\d+(</span>)',
                  rf'\g<1>{index:02d}\2',
                  card,
                  count=1,
              )

          grid_pattern = re.compile(r'(<div class="track-grid">)(.*?)(</div>\s*</section>)', re.S)
          card_pattern = re.compile(r'<a class="track-card[^"]*" href="([^"]+)">.*?</a>', re.S)

          for path in Path('songs').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              original = text

              def reorder_grid(match):
                  start, body, end = match.groups()
                  cards = card_pattern.findall(body)
                  card_blocks = card_pattern.finditer(body)
                  by_file = {}
                  for item in card_pattern.finditer(body):
                      href = item.group(1)
                      by_file[norm_href(href)] = item.group(0)

                  if not all(name in by_file for name in release_order):
                      return match.group(0)

                  ordered = []
                  for i, name in enumerate(release_order, 1):
                      ordered.append(update_index(by_file[name], i))

                  new_body = "\n\n".join(ordered)
                  return f"{start}\n\n{new_body}\n  {end}"

              text = grid_pattern.sub(reorder_grid, text)
              if text != original:
                  path.write_text(text, encoding='utf-8')

          Path('.github/workflows/reorder-song-cards.yml').unlink(missing_ok=True)
          PY
      - name: Commit reordered song cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No song card order changes to commit"
          else
            git commit -m "Reorder song cards by release date"
            git push
          fi
