name: Add Index Hero Image

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  add-image:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode optimized hero image
        run: |
          base64 -d > images/index-ver2.jpg <<'EOF'

EOF
          rm .github/workflows/add-index-ver2-image.yml
      - name: Commit image asset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add second index hero image"
          git push
