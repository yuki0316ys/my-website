name: SEO HTML Optimize

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  optimize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Optimize SEO metadata
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import html

          SITE = "https://yuki-music.jp"
          OLD = "https://yuki0316ys.github.io/my-website"
          X_URL = "https://x.com/Youking74514090"
          YOUTUBE_URL = "https://www.youtube.com/@YUKIOFFICIALSTUDIOPRO01"
          TIKTOK_URL = "https://www.tiktok.com/@yukiosp01?is_from_webapp=1&sender_device=pc"
          TUNECORE_URL = "https://www.tunecore.co.jp/artists/Yu-103"
          FANCLUB_URL = "https://www.youtube.com/channel/UCdZMz61Y8oS4kfC9CP4esTA/join"

          page_descriptions = {
              "index.html": "YUKI / 佑樹の公式サイト。シネマティックポップを軸に、逆夢、BE-TRIP、ライブ情報、プロフィール、楽曲、グッズ、SNSを掲載。",
              "news.html": "YUKI / 佑樹の最新ニュース。リリース、ライブ、グッズ、メディア情報を掲載。",
              "live.html": "YUKI / 佑樹のライブ情報。公演スケジュール、出演情報、チケット情報を掲載。",
              "profile.html": "YUKI / 佑樹のプロフィール。シネマティックポップを軸に活動するシンガーソングライターの公式プロフィール。",
              "biography.html": "YUKI / 佑樹のバイオグラフィー。音楽活動、リリース、ライブ実績を掲載。",
              "store.html": "YUKI / 佑樹のストア情報。グッズ、デジタルコンテンツ、関連アイテムを掲載。",
              "contact.html": "YUKI / 佑樹へのお問い合わせページ。出演、制作、楽曲、プロジェクト相談はこちら。",
              "songs/songs.html": "YUKI / 佑樹の楽曲一覧。逆夢、BE-TRIP、NEXT INNOVATION! など全13曲の個別ページへ。",
          }

          song_titles = {
              "songs/Sakayume.html": "逆夢",
              "songs/BE-TRIP.html": "BE-TRIP",
              "songs/Nextinnovation.html": "NEXT INNOVATION!",
              "songs/Freedom.html": "Freedom",
              "songs/KeepOnlyOneLady.html": "Keep Only One Lady",
              "songs/harutoakikaze.html": "春と秋風の彩りを",
              "songs/amaterasu.html": "天照",
              "songs/JENESIS.html": "JENESIS",
              "songs/rinne.html": "輪廻の中で自由を求め続けた弱者",
              "songs/akatsuki.html": "曉",
              "songs/Breakingallthechains.html": "Breaking all the chains",
              "songs/uno.html": "ウーノ",
              "songs/The Beast.html": "The Beast",
          }

          def page_url(path: Path) -> str:
              rel = path.as_posix()
              if rel == "index.html":
                  return SITE + "/"
              return f"{SITE}/{rel.replace(' ', '%20')}"

          def set_meta(content, name_or_prop, key, value):
              value = html.escape(value, quote=True)
              pattern = rf'<meta\s+{name_or_prop}="{re.escape(key)}"\s+content="[^"]*"\s*/?>'
              repl = f'<meta {name_or_prop}="{key}" content="{value}">'
              if re.search(pattern, content, flags=re.I | re.S):
                  return re.sub(pattern, repl, content, count=1, flags=re.I | re.S)
              return content.replace("</head>", f"  {repl}\n</head>", 1)

          def set_canonical(content, url):
              tag = f'<link rel="canonical" href="{url}">'
              pattern = r'<link\s+rel="canonical"\s+href="[^"]*"\s*/?>'
              if re.search(pattern, content, flags=re.I | re.S):
                  return re.sub(pattern, tag, content, count=1, flags=re.I | re.S)
              return content.replace("</head>", f"  {tag}\n</head>", 1)

          def replace_description(content, description):
              desc = html.escape(description, quote=True)
              pattern = r'<meta\s+name="description"\s+content=".*?"\s*/?>'
              repl = f'<meta name="description" content="{desc}">'
              if re.search(pattern, content, flags=re.I | re.S):
                  return re.sub(pattern, repl, content, count=1, flags=re.I | re.S)
              return content.replace("</head>", f"  {repl}\n</head>", 1)

          def add_fanclub_nav(content):
              if 'nav-fanclub' in content:
                  return content
              return re.sub(
                  r'(<a href="(?:\.\./)?contact\.html">(?:Contact|contact)</a>)',
                  rf'\1\n    <a class="nav-fanclub" href="{FANCLUB_URL}" target="_blank" rel="noopener noreferrer">FANCLUB</a>',
                  content,
                  count=1,
              )

          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              rel = path.as_posix()
              content = path.read_text(encoding='utf-8')
              original = content
              url = page_url(path)
              title = song_titles.get(rel)
              description = page_descriptions.get(rel)
              if title:
                  description = f"{title} / YUKI / 佑樹の公式楽曲ページ。歌詞、プレビュー、関連楽曲、SNSフォロー導線を掲載。"

              content = content.replace(OLD, SITE)
              content = content.replace('https://x.com/"', X_URL + '"')
              if description:
                  content = replace_description(content, description)
                  content = set_meta(content, 'property', 'og:description', description)
                  content = set_meta(content, 'name', 'twitter:description', description)
              content = set_canonical(content, url)
              content = set_meta(content, 'property', 'og:url', url)
              content = set_meta(content, 'property', 'og:site_name', 'YUKI / 佑樹 Official Site')
              content = set_meta(content, 'name', 'twitter:card', 'summary_large_image')
              if title:
                  og_title = f"{title} | YUKI / 佑樹"
                  content = set_meta(content, 'property', 'og:title', og_title)
                  content = set_meta(content, 'name', 'twitter:title', og_title)
              elif rel == 'index.html':
                  content = set_meta(content, 'name', 'twitter:title', 'YUKI / 佑樹 Official Site')
              content = content.replace('"sameAs":[\n    "https://www.youtube.com/@YUKIOFFICIALSTUDIOPRO01",\n    "https://x.com/"\n  ]', f'"sameAs":[\n    "{YOUTUBE_URL}",\n    "{X_URL}",\n    "{TIKTOK_URL}",\n    "{TUNECORE_URL}"\n  ]')
              content = content.replace(f'"url":"{SITE}/"', f'"url":"{SITE}/"')
              content = add_fanclub_nav(content)
              if content != original:
                  path.write_text(content, encoding='utf-8')

          Path('robots.txt').write_text('User-agent: *\nAllow: /\n\nSitemap: https://yuki-music.jp/sitemap.xml\n', encoding='utf-8')
          Path('.github/workflows/seo-html-optimize.yml').unlink(missing_ok=True)
          PY
      - name: Commit optimized SEO files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No SEO changes to commit"
          else
            git commit -m "Optimize SEO metadata for production domain"
            git push
          fi
