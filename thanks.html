<head>
<meta charset="UTF-8">

<title>送信完了 | YUKI / 佑樹</title>
<link rel="stylesheet" href="mobile-safe.css?v=2026061806" media="(max-width: 768px), ((max-height: 768px) and (orientation: landscape) and (hover: none) and (pointer: coarse))">
<style>
  @media (min-width: 769px) {
    html.desktop-loading body { opacity: 0; }
    html.desktop-ready body { opacity: 1; transition: opacity .12s ease; }
  }
</style>
<script>
  if (window.matchMedia("(min-width: 769px)").matches) {
    document.documentElement.classList.add("desktop-loading");
    const desktopStylesheet = document.createElement("link");
    desktopStylesheet.rel = "stylesheet";
    desktopStylesheet.href = "style.css?v=2026061801";
    desktopStylesheet.onload = () => {
      document.documentElement.classList.remove("desktop-loading");
      document.documentElement.classList.add("desktop-ready");
    };
    desktopStylesheet.onerror = () => {
      document.documentElement.classList.remove("desktop-loading");
      document.documentElement.classList.add("desktop-ready");
    };
    document.head.appendChild(desktopStylesheet);
    setTimeout(() => {
      document.documentElement.classList.remove("desktop-loading");
      document.documentElement.classList.add("desktop-ready");
    }, 1200);
  }
</script>
