<script>

<script>
const newsDetails = {
  "rehabilitation-title": {
    date: "2026.6.30",
    title: "佑樹 Rehabilitation 2026 死ガフタリヲワカツマデ Release Event 2026.11.1 開催決定！",
    body: "佑樹のライブ「Rehabilitation 2026 死ガフタリヲワカツマデ Release Event」が、2026年11月1日に開催決定しました。詳細は順次公式サイトにてお知らせします。"
  },
  renewal: {
    date: "2026.6.20",
    title: "ホームページリニューアル！",
    body: "YUKI / 佑樹 公式ホームページをリニューアルしました。最新ニュース、楽曲、ライブ、ストア情報をより見やすく確認できるように整えています。"
  },
  "line-sticker": {
    date: "2026.05.11",
    title: "ゆっくんLINEスタンプ販売開始！",
    body: "ゆっくんLINEスタンプの販売を開始しました。日常のトークで使いやすいスタンプをぜひチェックしてください。",
    linkUrl: "https://line.me/S/sticker/33985072",
    linkLabel: "LINEスタンプを見る"
  },
  shigafutari: {
    date: "2026.04.15",
    title: "14th Single 死ガフタリヲワカツマデ リリース決定！",
    body: "14th Single「死ガフタリヲワカツマデ」のリリースが決定しました。楽曲情報は順次公式サイトにてお知らせします。"
  }
};

const newsModal = document.getElementById("newsModal");
const newsModalPanel = newsModal ? newsModal.querySelector(".news-modal__panel") : null;
const newsModalDate = document.getElementById("newsModalDate");
const newsModalTitle = document.getElementById("newsModalTitle");
const newsModalBody = document.getElementById("newsModalBody");
const newsModalLinkWrap = document.getElementById("newsModalLinkWrap");
let lastNewsTrigger = null;

function fitModalTitle(titleElement) {
  if (!titleElement) return;

  titleElement.style.fontSize = "";
  const minSize = window.matchMedia("(max-width: 768px), ((max-height: 768px) and (orientation: landscape) and (hover: none) and (pointer: coarse))").matches ? 6 : 9;
  let size = parseFloat(window.getComputedStyle(titleElement).fontSize);

  while (titleElement.scrollWidth > titleElement.clientWidth && size > minSize) {
    size -= .5;
    titleElement.style.fontSize = `${size}px`;
  }
}

function openNewsModal(newsId, trigger) {
  const detail = newsDetails[newsId];
  if (!detail || !newsModal) return;

  lastNewsTrigger = trigger;
  newsModalDate.textContent = detail.date;
  newsModalTitle.textContent = detail.title;
  newsModalBody.textContent = detail.body;
  newsModalLinkWrap.textContent = "";

  if (detail.linkUrl) {
    const link = document.createElement("a");
    link.href = detail.linkUrl;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.textContent = detail.linkLabel;
    newsModalLinkWrap.appendChild(link);
  }

  newsModal.classList.add("active");
  newsModal.setAttribute("aria-hidden", "false");
  document.body.classList.add("news-modal-open");
  requestAnimationFrame(() => fitModalTitle(newsModalTitle));
  if (newsModalPanel) newsModalPanel.focus();
}

function closeNewsModal() {
  if (!newsModal) return;

  newsModal.classList.remove("active");
  newsModal.setAttribute("aria-hidden", "true");
  document.body.classList.remove("news-modal-open");
  if (lastNewsTrigger) lastNewsTrigger.focus();
}

document.querySelectorAll(".news-open").forEach(button => {
  button.addEventListener("click", () => openNewsModal(button.dataset.newsId, button));
});

document.querySelectorAll("[data-news-close]").forEach(button => {
  button.addEventListener("click", closeNewsModal);
});

document.addEventListener("keydown", event => {
  if (event.key === "Escape" && newsModal && newsModal.classList.contains("active")) {
    closeNewsModal();
  }
});

window.addEventListener("resize", () => {
  if (newsModal && newsModal.classList.contains("active")) {
    fitModalTitle(newsModalTitle);
  }
});
</script>
