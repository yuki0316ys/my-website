<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEWS | YUKI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
 <a class="brand-button" href="index.html">YUKI</a>
  <nav class="nav">
    <a href="live.html">Live</a>
   <a href="songs/songs.html">Songs</a>
    <a href="Profile.html">Profile</a>
    <a href="store.html">Store</a>
   <a href="contact.html">contact</a>
  </nav>
</header>

<main class="news-apple">

  <!-- ヒーロー（大きい余白＋強い文字） -->
  <section class="news-hero">
    <h1>NEWS</h1>
    <p class="hero-sub">最新情報とストーリー</p>
  </section>

  <section class="news-list">

  <div class="news-card featured">
    <p class="date">2026.05.01</p>
    <h3>新曲「逆夢」リリース</h3>
    <p>Apple Musicランキング1位を獲得</p>

    <div class="news-cta">
      <p class="cta-text">
        1位を獲得した楽曲を今すぐ体験
      </p>
      <a href="songs/index.html" class="button main-cta">
        今すぐ聴く
      </a>
    </div>
  </div>

  <div class="news-card">
    <p class="date">2026.04.10</p>
    <h3>ワンマンライブ開催決定</h3>
    <p>名古屋クラブクアトロにて開催予定</p>
  </div>

</section>

</main>

 <script>
window.addEventListener("scroll", () => {
  const header = document.querySelector(".header");
  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
