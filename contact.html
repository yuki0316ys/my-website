<main class="contact-page">
<section class="contact-section">
  <form action="https://formspree.io/f/xdabeerg" method="POST" class="contact-form">
    <div class="form-group">
      <label for="contact-name">お名前</label>
      <input id="contact-name" type="text" name="name" placeholder="山田 太郎" required>
    </div>
    <div class="form-group">
      <label for="contact-email">メールアドレス</label>
      <input id="contact-email" type="email" name="email" placeholder="example@email.com" required>
    </div>
    <div class="form-group">
      <label for="contact-type">お問い合わせ内容</label>
      <select id="contact-type" name="type" required>
        <option value="">選択してください</option>
        <option value="music">楽曲制作の依頼</option>
        <option value="live">ライブ出演依頼</option>
        <option value="collab">コラボ・共同制作</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="form-group">
      <label for="contact-message">詳細</label>
      <textarea id="contact-message" name="message" rows="5" placeholder="内容をご記入ください" required></textarea>
    </div>
    <input type="hidden" name="_subject" value="YUKIサイトからお問い合わせ">
    <input type="hidden" name="_redirect" value="https://yuki-music.jp/thanks.html">
    <button type="submit" class="button main-cta">送信する</button>
  </form>
</section>
