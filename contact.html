<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | YUKI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <a class="brand-button" href="index.html">YUKI</a>
  <nav class="nav">
     <a href="news.html">News</a>
    <a href="live.html">Live</a>
      <a href="songs/songs.html">Songs</a>
    <a href="Profile.html#profile">Profile</a>
    <a href="store.html">Store</a>
  </nav>
</header>

<main class="contact-page">

  <!-- タイトル -->
  <section class="contact-hero">
    <h1>Contact</h1>
    <p class="hero-sub">
      お仕事・出演依頼・コラボのご相談はこちら
    </p>
  </section>
 <p class="contact-target">
  楽曲制作、ライブ出演、コラボ、各種ご依頼はこちらからお問い合わせください。
</p>
  <p class="contact-trust">
  内容確認後、通常2〜3日以内にご返信いたします。
</p>
  <!-- フォーム -->
  <section class="contact-form">

    <form action="#" method="post" class="contact-form">

  <!-- 名前 -->
  <label>お名前</label>
  <input type="text" name="name" placeholder="山田 太郎" required>

  <!-- メール -->
  <label>メールアドレス</label>
  <input type="email" name="email" placeholder="example@email.com" required>

  <!-- 件名 -->
  <label>お問い合わせ内容</label>
  <select name="type" required>
    <option value="">選択してください</option>
    <option value="music">楽曲制作の依頼</option>
    <option value="live">ライブ出演依頼</option>
    <option value="collab">コラボ・共同制作</option>
    <option value="other">その他</option>
  </select>

  <!-- 本文 -->
  <label>詳細</label>
  <textarea name="message" rows="5" placeholder="内容をご記入ください" required></textarea>

  <!-- CTA -->
  <p class="contact-cta">
    あなたのプロジェクトに音楽で価値を加えます
  </p>

  <button type="submit" class="button main-cta">
    送信する
  </button>

</form>

  </section>

</main>

</body>
</html>
