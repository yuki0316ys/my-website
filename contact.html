<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | YUKI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <a class="brand-button" href="index.html">YUKI</a>
  <nav class="nav">
     <a href="news.html">News</a>
    <a href="live.html">Live</a>
      <a href="songs/songs.html">Songs</a>
    <a href="Profile.html#profile">Profile</a>
    <a href="store.html">Store</a>
  </nav>
</header>

<main class="contact-page">

  <!-- タイトル -->
  <section class="contact-hero">
    <h1>Contact</h1>
    <p class="hero-sub">
      お仕事・出演依頼・コラボのご相談はこちら
    </p>
  </section>
 <p class="contact-target">
  楽曲制作、ライブ出演、コラボ、各種ご依頼はこちらからお問い合わせください。
</p>
  <p class="contact-trust">
  内容確認後、通常2〜3日以内にご返信いたします。
</p>
  <!-- フォーム -->
  <section class="contact-form">

    <form action="https://formspree.io/f/your-id" method="POST">

      <label>会社名 / お名前</label>
      <input type="text" name="name" required>

      <label>メールアドレス</label>
      <input type="email" name="email" required>

      <label>お問い合わせ内容</label>
      <textarea name="message" rows="6" required></textarea>

      <p class="contact-cta">
  あなたのプロジェクトに音楽で価値を加えます
</p>
      
      <button type="submit" class="main-cta">
       送信する
      </button>

    </form>

  </section>

</main>

</body>
</html>
