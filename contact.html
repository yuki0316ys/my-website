<main class="contact-page">
 
  <!-- フォーム -->
  <section class="contact-form">

    <form action="https://formspree.io/f/xdabeerg" method="POST" class="contact-form">

  <!-- 名前 -->
  <label>お名前</label>
  <input type="text" name="name" placeholder="山田 太郎" required>

  <!-- メール -->
  <label>メールアドレス</label>
  <input type="email" name="email" placeholder="example@email.com" required>

  <!-- 種類 -->
  <label>お問い合わせ内容</label>
  <select name="type" required>
    <option value="">選択してください</option>
    <option value="music">楽曲制作の依頼</option>
    <option value="live">ライブ出演依頼</option>
    <option value="collab">コラボ・共同制作</option>
    <option value="other">その他</option>
  </select>

  <!-- 本文 -->
  <label>詳細</label>
  <textarea name="message" rows="5" placeholder="内容をご記入ください" required></textarea>

  <!-- 件名 -->
  <input type="hidden" name="_subject" value="YUKIサイトからお問い合わせ">

  <!-- 送信後 -->
  <input type="hidden" name="_redirect" value="https://yuki0316ys.github.io/my-website/thanks.html">

  <button type="submit" class="button main-cta">
    送信する
  </button>

</form>
