<!DOCTYPE html>
<html lang="ja">

<title>STORE | YUKI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <a class="brand" href="index.html">Yuki</a>
  <nav class="nav">
    <a href="index.html#video">Video</a>
    <a href="index.html#profile">Profile</a>
    <a href="songs/index.html">Music</a>
    <a href="news.html">News</a>
    <a href="live.html">Live</a>
    <a href="store.html">Store</a>
    <a href="index.html#contact">Social</a>
  </nav>
</header>

<main class="store-page">

  <!-- タイトル -->
  <section class="store-hero">
    <h1>STORE</h1>
    <p>YUKI Official Goods</p>
  </section>

  <!-- 商品 -->
  <section class="product-grid">

    <div class="product-card">
      <p class="product-tag">人気No.1</p>
      <img src="images/tshirt.jpg">
      <h2>YUKI T-Shirt</h2>
      <p>¥4,500</p>
      <a href="https://yukiosp01.base.shop/"
         target="_blank"
         rel="noopener noreferrer"
         class="buy-btn">BUY</a>
    </div>

    <div class="product-card">
      <p class="product-tag">数量限定</p>
      <img src="images/hoodie.jpg">
      <h2>YUKI Hoodie</h2>
      <p>¥8,000</p>
      <a href="https://yukiosp01.base.shop/"
         target="_blank"
         rel="noopener noreferrer"
         class="buy-btn">BUY</a>
    </div>

  </section>

  <!-- BASE誘導（最重要） -->
  <div class="store-cta">
    <a href="https://yukiosp01.base.shop/"
       target="_blank"
       rel="noopener noreferrer"
       class="main-cta">
       ▶ BASEでショップを見る
    </a>
  </div>

  <p class="store-note">
    ※購入はBASE公式ショップに移動します
  </p>
