<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Fonts Test | YUKI / 佑樹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html { background:#000; -webkit-text-size-adjust:100%; }
    body { margin:0; background:#050505; color:#f7f1e8; font-family:"Inter","Noto Sans JP",system-ui,sans-serif; overflow-x:hidden; }
    header { position:sticky; top:0; padding:18px; background:rgba(0,0,0,.92); border-bottom:1px solid rgba(255,255,255,.1); font-weight:700; }
    main { padding:48px 18px; text-align:center; }
    h1 { font-family:"Cormorant Garamond",serif; font-size:clamp(3rem,15vw,6rem); line-height:1; }
    p { color:rgba(247,241,232,.72); line-height:1.7; }
  </style>
</head>
<body>
  <header>YUKI / 佑樹 Fonts Test</header>
  <main>
    <h1>YUKI<br>佑樹</h1>
    <p>Google Fonts only test. No external site CSS, no images, no video, no JS.</p>
  </main>
</body>
</html>
