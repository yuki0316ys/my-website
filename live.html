<script>
const liveDetails = {
  rehabilitation: {
    date: "2026.11.1",
    title: "佑樹 Rehabilitation 2026 死ガフタリヲワカツマデ Release Event",
    body: "佑樹のライブ「Rehabilitation 2026 死ガフタリヲワカツマデ Release Event」が、2026年11月1日に開催決定しました。公演の詳細は決まり次第、公式サイトにてお知らせします。",
    linkUrl: "contact.html?type=live-reserve",
    linkLabel: "ライブ予約はこちら"
  },
  room623: {
    date: "2024.9.23",
    title: "N.Y ハーレム「ROOM 623」にてセッション参加",
    body: "N.Y ハーレム「ROOM 623」にてセッションに参加しました。海外の空気を感じるステージでの経験を、今後の音楽活動へつなげていきます。"
  },
  "line-cube": {
    date: "2024.8.7",
    title: "LINE CUBE SHIBUYA（渋谷公会堂）オープニングアクト出演",
    body: "LINE CUBE SHIBUYA（渋谷公会堂）にてオープニングアクトとして出演しました。大きなステージでYUKI / 佑樹の音楽を届けました。"
  },
  "be-free": {
    date: "2023.11.13",
    title: "名古屋クラブクアトロ Oneman Live BE-FREE",
    body: "名古屋クラブクアトロにてOneman Live BE-FREEを開催しました。ソロアーティストとしての歩みを刻むワンマンライブとなりました。"
  }
};

const liveModal = document.getElementById("liveModal");
const liveModalPanel = liveModal ? liveModal.querySelector(".news-modal__panel") : null;
const liveModalDate = document.getElementById("liveModalDate");
const liveModalTitle = document.getElementById("liveModalTitle");
const liveModalBody = document.getElementById("liveModalBody");
const liveModalLinkWrap = document.getElementById("liveModalLinkWrap");
const liveModalLink = document.getElementById("liveModalLink");
let lastLiveTrigger = null;

function fitModalTitle(titleElement) {
  if (!titleElement) return;

  titleElement.style.fontSize = "";
  const minSize = window.matchMedia("(max-width: 768px), ((max-height: 768px) and (orientation: landscape) and (hover: none) and (pointer: coarse))").matches ? 6 : 9;
  let size = parseFloat(window.getComputedStyle(titleElement).fontSize);

  while (titleElement.scrollWidth > titleElement.clientWidth && size > minSize) {
    size -= .5;
    titleElement.style.fontSize = `${size}px`;
  }
}

function openLiveModal(liveId, trigger) {
  const detail = liveDetails[liveId];
  if (!detail || !liveModal) return;

  lastLiveTrigger = trigger;
  liveModalDate.textContent = detail.date;
  liveModalTitle.textContent = detail.title;
  liveModalBody.textContent = detail.body;
  if (liveModalLinkWrap && liveModalLink) {
    if (detail.linkUrl && detail.linkLabel) {
      liveModalLink.href = detail.linkUrl;
      liveModalLink.textContent = detail.linkLabel;
      liveModalLinkWrap.hidden = false;
    } else {
      liveModalLinkWrap.hidden = true;
    }
  }
  liveModal.classList.add("active");
  liveModal.setAttribute("aria-hidden", "false");
  document.body.classList.add("news-modal-open");
  requestAnimationFrame(() => fitModalTitle(liveModalTitle));
  if (liveModalPanel) liveModalPanel.focus();
}

function closeLiveModal() {
  if (!liveModal) return;

  liveModal.classList.remove("active");
  liveModal.setAttribute("aria-hidden", "true");
  document.body.classList.remove("news-modal-open");
  if (lastLiveTrigger) lastLiveTrigger.focus();
}

document.querySelectorAll(".live-open").forEach(button => {
  button.addEventListener("click", () => openLiveModal(button.dataset.liveId, button));
});

document.querySelectorAll("[data-live-close]").forEach(button => {
  button.addEventListener("click", closeLiveModal);
});

document.addEventListener("keydown", event => {
  if (event.key === "Escape" && liveModal && liveModal.classList.contains("active")) {
    closeLiveModal();
  }
});

window.addEventListener("resize", () => {
  if (liveModal && liveModal.classList.contains("active")) {
    fitModalTitle(liveModalTitle);
  }
});
</script>
