<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE | YUKI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <a class="brand-button" href="index.html">YUKI</a>
  <nav class="nav">
    <a href="news.html">News</a>
    <a href="songs/songs.html">Songs</a>
    <a href="Profile.html">Profile</a>
    <a href="store.html">Store</a>
    <a href="contact.html">contact</a>
  </nav>
</header>

<main class="live-apple">

  <section class="live-hero">
    <h1>LIVE</h1>
    <p class="hero-sub">音と光が交差する場所へ</p>
  </section>

  <section class="live-list">

    <div class="live-item">
      <div class="live-info">
        <span class="date">2026.09</span>
        <h2>Rehabilitation The Invitation Live 2026</h2>
        <p>大塚Meets</p>
      </div>
      <a href="#" class="ticket-btn">Tickets</a>
    </div>

  </section>

</main>

<script>
window.addEventListener("scroll", () => {
  const header = document.querySelector(".header");
  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});
</script>
  
</body>
</html>
